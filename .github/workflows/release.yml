name: release

# The whole release lifecycle in one run. release-please is the single version
# authority: on push to main it maintains a Release PR (bumping pyproject and
# src/caw/__init__.py from conventional commits) and, on merge, creates the tag
# and GitHub Release. The build is the back half of that same run — a downstream
# job, not a re-triggered workflow.
#
# There is no raw `push: tags` trigger: a human-chosen tag name and the version
# `uv build` reads from pyproject are never reconciled, and a manual tag is
# invisible to release-please's manifest. The only manual path is a
# workflow_dispatch that re-builds and re-attaches artifacts to an *existing*
# release (ops recovery); it bumps nothing (see ADR 0005).
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v* tag whose release to re-build and re-attach artifacts to
        required: true
        type: string

permissions:
  contents: read

jobs:
  release-please:
    # Only the automatic path computes a version; on workflow_dispatch there is
    # nothing to compute, so this job is skipped and build runs against the input.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      prs_created: ${{ steps.release.outputs.prs_created }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main

  # release-please bumps pyproject.toml and src/caw/__init__.py on the Release PR
  # but never re-locks uv.lock, which embeds the project's own `caw` version. The
  # PR's `uv sync --locked` gate then fails on the stale lockfile (Release PR #45).
  # Re-lock on the Release PR branch so the PR's own CI sees a matching lockfile.
  sync-lockfile:
    needs: release-please
    # prs_created is true when a Release PR is created *or updated*, so this fires
    # on the version-bump PR itself rather than only at release time. Dispatch
    # never touches a Release PR, so this is push-only.
    if: github.event_name == 'push' && needs.release-please.outputs.prs_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Check out the Release PR's own branch (headBranchName from the action's
          # `pr` output) so the re-lock lands on the PR, not on main.
          ref: ${{ fromJSON(needs.release-please.outputs.pr).headBranchName }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
      - name: Re-lock uv.lock for the bumped version
        run: uv lock
      - name: Commit uv.lock if it changed
        # No-op when the lockfile is already in sync: skip the commit on no diff so
        # an unchanged uv.lock never produces an empty commit. Pushing here re-runs
        # CI on the Release PR branch (desired) but not release-please, which only
        # triggers on push to main.
        run: |
          if git diff --quiet -- uv.lock; then
            echo "uv.lock already in sync; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add uv.lock
          git commit -m "chore: sync uv.lock to the released version"
          git push

  # The back half of a release. Runs in exactly two cases:
  #   (a) automatic: push to main where release-please created a release;
  #   (b) manual: workflow_dispatch re-build of an existing tag's release.
  # release-please is skipped on dispatch, so `always()` keeps this job reachable;
  # the explicit event/output checks then admit only the two intended origins.
  # This is the only build trigger, so one release builds exactly once — a raw
  # tag push fires nothing.
  build:
    needs: [release-please]
    if: ${{ always() && ( (github.event_name == 'push' && needs.release-please.outputs.release_created == 'true') || github.event_name == 'workflow_dispatch' ) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      # Serialize per tag so an automatic build and a manual rebuild of the same
      # release never race each other's uploads.
      group: release-build-${{ github.event.inputs.tag || needs.release-please.outputs.tag_name }}
    env:
      TAG: ${{ github.event.inputs.tag || needs.release-please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.inputs.tag || needs.release-please.outputs.tag_name }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: uv build
      - name: Ensure the GitHub Release exists
        env:
          GH_TOKEN: ${{ github.token }}
        # On the automatic path release-please creates the Release first; on a
        # manual rebuild the release already exists. Create it only if missing.
        run: |
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" --verify-tag --generate-notes
          fi
      - name: Attach artifacts to the Release
        env:
          GH_TOKEN: ${{ github.token }}
        # --clobber keeps the upload idempotent across an automatic build and any
        # later manual rebuild of the same release.
        run: gh release upload "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
