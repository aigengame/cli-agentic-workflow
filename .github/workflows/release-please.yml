name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      prs_created: ${{ steps.release.outputs.prs_created }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main

  # The tag above is created with the default GITHUB_TOKEN, so it never fires
  # the `push: tags` trigger of release-build; hand off explicitly instead.
  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/release-build.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
    permissions:
      contents: write

  # release-please bumps pyproject.toml and src/caw/__init__.py on the Release PR
  # but never re-locks uv.lock, which embeds the project's own `caw` version. The
  # PR's `uv sync --locked` gate then fails on the stale lockfile (Release PR #45).
  # Re-lock on the Release PR branch so the PR's own CI sees a matching lockfile.
  sync-lockfile:
    needs: release-please
    # prs_created is true when a Release PR is created *or updated*, so this fires
    # on the version-bump PR itself rather than only at release time.
    if: needs.release-please.outputs.prs_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Check out the Release PR's own branch (headBranchName from the action's
          # `pr` output) so the re-lock lands on the PR, not on main.
          ref: ${{ fromJSON(needs.release-please.outputs.pr).headBranchName }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
      - name: Re-lock uv.lock for the bumped version
        run: uv lock
      - name: Commit uv.lock if it changed
        # No-op when the lockfile is already in sync: skip the commit on no diff so
        # an unchanged uv.lock never produces an empty commit. Pushing here re-runs
        # CI on the Release PR branch (desired) but not release-please, which only
        # triggers on push to main.
        run: |
          if git diff --quiet -- uv.lock; then
            echo "uv.lock already in sync; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add uv.lock
          git commit -m "chore: sync uv.lock to the released version"
          git push
